<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="user-scalable=no, initial-scale=1.0">
    <title>Guest Speaker Introduction</title>
    <link rel="stylesheet" href="../css/introducing_guest.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div id="wrapper">

        <!-- Gold decorative top bar -->
        <div id="top-bar"></div>

        <!-- Main content card -->
        <div id="card">

            <!-- University / Event Label -->
            <p id="event-label">USEK GRADUATION CEREMONY 2026</p>

            <!-- Divider line with star -->
            <div class="divider"><span>✦</span></div>

            <!-- Introduction label -->
            <p id="intro-label">Guest Speaker</p>

            <!-- Speaker Name -->
            <h1 id="speaker-name">Dr. Eng. Marcel Daccache</h1>

            <!-- Speaker Title -->
            <p id="speaker-title">Expert in Software Engineering</p>

            <!-- Divider line -->
            <div class="divider"><span>✦</span></div>

            <!-- Pepper live subtitles -->
            <p id="pepper-speech"></p>

        </div>

        <!-- Operator button — bottom right corner -->
        <button id="next-btn" onclick="goToNext()">Next Segment →</button>

        <!-- Gold decorative bottom bar -->
        <div id="bottom-bar"></div>

    </div>

    <script src="/libs/qimessaging/1.0/qimessaging.js"></script>
    <script src="../js/introducing_guest.js"></script>
</body>
</html>
